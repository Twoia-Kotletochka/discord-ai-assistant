<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bot Panel Login</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="locked login-only">
    <main class="shell">
      <section class="login" id="loginBox">
        <div class="login-window">
          <div class="login-brand">
            <div class="login-mark">AI</div>
            <div>
              <h2>Bot Panel</h2>
              <p>Закрытая панель управления</p>
            </div>
          </div>
          <form id="loginForm" class="login-form">
            <label>
              <span>Пароль панели</span>
              <input type="password" name="password" autocomplete="current-password" minlength="8" required autofocus>
            </label>
            <button type="submit">Войти</button>
            <p class="login-error" id="loginError"></p>
          </form>
        </div>
      </section>
    </main>
    <script src="/login.js"></script>
  </body>
</html>
